name: Build R6 6.12-24
on:
   workflow_dispatch:
jobs:
    build:
        name: Build R6 6.12-24
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Setup Ubuntu
              run: |
                sudo apt update
                sudo apt install -y subversion build-essential gettext 2to3 python3-pyelftools python3-distutils-extra
            - name: Setup Go
              uses: actions/setup-go@main
              with:
                go-version: '1.25.4'
                cache: false
            - name: Go Version
              run: go version
            - name: checkout
              uses: actions/checkout@main
            - name: Build
              run: |
                git clone https://github.com/openwrt/openwrt.git
                cp -rf r3/ms.patch openwrt/
                cp -rf r3/rk-snapshot openwrt/
                cp -rf r3/kmod-apk.patch openwrt/
                cp -rf r3/rng.patch openwrt/
                cp -rf r3/rk-6.12-config.patch openwrt/
                cp -rf r3/44.patch openwrt/
                cp -rf r3/45.patch openwrt/
                cp -rf r3/46.patch openwrt/
                cp -rf r3/kernel.patch openwrt/
                cp -rf r3/pm.patch openwrt/
                cp -rf r3/49-d-fll.patch openwrt/
                cp -rf r3/rk3599-overclock.patch openwrt/
                cp -rf r3/mac80211.patch openwrt/
                git config --global user.email md@any.ccc
                git config --global user.name 'M Z'
                cd openwrt
                wget https://github.com/4IceG/luci-app-mini-diskmanager/archive/refs/heads/main.zip
                unzip main.zip
                mv luci-app-mini-diskmanager-main/luci-app-mini-diskmanager package/luci-app-mini-diskmanager
                rm -rf luci-app-mini-diskmanager-main
                rm *.zip
                git apply mac80211.patch
                git apply kernel.patch
                git apply ms.patch
                git apply 44.patch
                git apply pm.patch
                sed -i -E 's;git.openwrt.org/(feed|project);github.com/openwrt;' feeds.conf.default
                sed -i "1s/packages.git/packages.git;openwrt-24.10/" feeds.conf.default
                sed -i "2s/luci.git/luci.git;openwrt-24.10/" feeds.conf.default
                ./scripts/feeds update -a
                ./scripts/feeds install -a
                cd feeds/luci
                wget https://gist.githubusercontent.com/mj22226/363cefecd314e45b49d8eafff8473fcf/raw/f327d1fcae5513be3abbeea1c6696c1da845a635/01-diskman.patch
                wget https://github.com/openwrt/luci/commit/721369b8bf04f87974e9757c465f827df936ef69.patch
                wget https://github.com/openwrt/luci/commit/9c7e472edb207cb18a46fd191471dcdfc2645da0.patch
                git apply 01-diskman.patch
                git apply 721369b8bf04f87974e9757c465f827df936ef69.patch
                git apply 9c7e472edb207cb18a46fd191471dcdfc2645da0.patch
                cd -
                cd  feeds/packages
                wget https://gist.githubusercontent.com/mj22226/351f11e66f08f06e37a985719a31ddb4/raw/89452f476c58d91de06e84560e5762b8e5df456e/01-cpu.patch
                wget https://gist.githubusercontent.com/mj22226/b66f5c1bd5fc7e1cb3cf2c690b5dbd5a/raw/b955e726cbb0948d932c8d6143229ad604320149/20-lxc.patch
                wget https://github.com/mj22226/packages/commit/41f8afe544dc8d3405888626e0a79efe67d5aa17.patch
                wget https://github.com/openwrt/packages/commit/8a87d20fd7f16f80f10a15c1f24230e9257e97c5.patch
                wget https://github.com/openwrt/packages/commit/209070b5cea8200b21f165b88a46b88f05ec803c.patch
                wget https://github.com/openwrt/packages/commit/5aff25eba62bf6df88c3cbacdddd20adc886ae3e.patch
                wget https://github.com/openwrt/packages/commit/7a64ae9da2edf2a504d751a0f07b7995492d7902.patch
                wget https://github.com/openwrt/packages/commit/7f0772c1a41a20698e23dbd53eff8643fde2d64f.patch
                wget https://github.com/openwrt/packages/commit/0c571ef5058b338cd6c77273cff3a225d1281e2a.patch
                wget https://github.com/openwrt/packages/commit/d29215e6b8a2b0a1f6e9c8b3236377128f1d13cd.patch
                wget https://github.com/openwrt/packages/commit/2c811dd762493c12ec899e1e89b47cc97f877c45.patch
                wget https://github.com/openwrt/packages/commit/ffec24dfcc614582ad71a3487f1a5aa8bfdc5454.patch
                wget https://github.com/openwrt/packages/commit/4e62e45aba016793c5fd4b9f1bcf3ee1616d4683.patch
                wget https://github.com/openwrt/packages/commit/983d7181cc42549efc3910ab3f5c7fde69886c54.patch
                wget https://github.com/openwrt/packages/commit/7699915b87bd7f5bdc831dd439ea4b807fa6ecd1.patch
                wget https://github.com/openwrt/packages/commit/7b39f0c1b8781df9d75d6d10d8dfee74bb74e0d9.patch
                wget https://github.com/openwrt/packages/commit/63f5058415a145c450fb162d0475af2409cc312c.patch
                wget https://github.com/openwrt/packages/commit/33e116297809aca1c2848ebcf90cb46c08a3ff05.patch
                wget https://github.com/openwrt/packages/commit/0d58d027535ca33527297e6bc27844a1283ff656.patch
                wget https://github.com/openwrt/packages/commit/2c78935539f06d1b4c48a358e95ff2e0fcdbeab5.patch
                wget https://github.com/openwrt/packages/commit/b093eea601195184ea1364c4678c35f96269f7f5.patch
                wget https://github.com/openwrt/packages/commit/0d18846dab8aba7a2c7a0ad3feeae42660fac36f.patch
                wget https://github.com/openwrt/packages/commit/5c26a8717b271a56316ff709f9e2d5cbb1bd14d9.patch
                wget https://github.com/openwrt/packages/commit/269af99ab1f5272134a6a7e2e911d01726fa1d75.patch
                wget https://github.com/openwrt/packages/commit/51b65ec78487e6da9c1ad0f3c4c802eba929f91b.patch
                wget https://github.com/openwrt/packages/commit/a5473150f3b1dcda1c8770b674870f2183a90143.patch
                wget https://github.com/openwrt/packages/commit/565866a47210c9711c29173052063779b6d3bcfc.patch
                wget https://github.com/openwrt/packages/commit/e7d9c865036d7bc2ac30604e8573f25ae601aed1.patch
                wget https://github.com/openwrt/packages/commit/0c10c224be81f9221dabfab449855ab6718d2a0c.patch
                wget https://github.com/openwrt/packages/commit/db34f33cc712ef2c6c4ca2f7ace1f428e83f316c.patch
                wget https://github.com/openwrt/packages/commit/7ccbb9a66cfadba035e2ad95a7931877e5faf504.patch
                wget https://github.com/openwrt/packages/commit/2a317ac466005961cb27ac4d6502535c39014269.patch
                git apply 01-cpu.patch
                git apply 20-lxc.patch
                git apply 41f8afe544dc8d3405888626e0a79efe67d5aa17.patch
                git apply 8a87d20fd7f16f80f10a15c1f24230e9257e97c5.patch
                git apply 209070b5cea8200b21f165b88a46b88f05ec803c.patch
                git apply 5aff25eba62bf6df88c3cbacdddd20adc886ae3e.patch
                git apply 7a64ae9da2edf2a504d751a0f07b7995492d7902.patch
                git apply 7f0772c1a41a20698e23dbd53eff8643fde2d64f.patch
                git apply 0c571ef5058b338cd6c77273cff3a225d1281e2a.patch
                git apply d29215e6b8a2b0a1f6e9c8b3236377128f1d13cd.patch
                git apply 2c811dd762493c12ec899e1e89b47cc97f877c45.patch
                git apply ffec24dfcc614582ad71a3487f1a5aa8bfdc5454.patch
                git apply 4e62e45aba016793c5fd4b9f1bcf3ee1616d4683.patch
                git apply 983d7181cc42549efc3910ab3f5c7fde69886c54.patch
                git apply 7699915b87bd7f5bdc831dd439ea4b807fa6ecd1.patch
                git apply 7b39f0c1b8781df9d75d6d10d8dfee74bb74e0d9.patch
                git apply 63f5058415a145c450fb162d0475af2409cc312c.patch
                git apply 33e116297809aca1c2848ebcf90cb46c08a3ff05.patch
                git apply 0d58d027535ca33527297e6bc27844a1283ff656.patch
                git apply 2c78935539f06d1b4c48a358e95ff2e0fcdbeab5.patch
                git apply b093eea601195184ea1364c4678c35f96269f7f5.patch
                git apply 0d18846dab8aba7a2c7a0ad3feeae42660fac36f.patch
                git apply 5c26a8717b271a56316ff709f9e2d5cbb1bd14d9.patch
                git apply 269af99ab1f5272134a6a7e2e911d01726fa1d75.patch
                git apply 51b65ec78487e6da9c1ad0f3c4c802eba929f91b.patch
                git apply a5473150f3b1dcda1c8770b674870f2183a90143.patch
                git apply 565866a47210c9711c29173052063779b6d3bcfc.patch
                git apply e7d9c865036d7bc2ac30604e8573f25ae601aed1.patch
                git apply 0c10c224be81f9221dabfab449855ab6718d2a0c.patch
                git apply db34f33cc712ef2c6c4ca2f7ace1f428e83f316c.patch
                git apply 7ccbb9a66cfadba035e2ad95a7931877e5faf504.patch
                git apply 2a317ac466005961cb27ac4d6502535c39014269.patch
                cd -
                sed -i "71s/'0'/'1'/" feeds/luci/applications/luci-app-statistics/root/etc/config/luci_statistics
                sed -i "84s/'0'/'1'/" feeds/luci/applications/luci-app-statistics/root/etc/config/luci_statistics
                sed -i "195s/'0'/'1'/" feeds/luci/applications/luci-app-statistics/root/etc/config/luci_statistics
                sed -i "212s/'0'/'1'/" feeds/luci/applications/luci-app-statistics/root/etc/config/luci_statistics
                sed -i "13s/'1'/'0'/" feeds/packages/utils/dockerd/files/etc/config/dockerd
                sed -i "4s/login/login -f root/" feeds/packages/utils/ttyd/files/ttyd.config
                sed -i "1595s/KERNEL_PREEMPT_NONE/KERNEL_PREEMPT_VOLUNTARY/" config/Config-kernel.in
                rm -f target/linux/generic/hack-6.12/930-Revert-Revert-Revert-driver-core-Set-fw_devlink-on-b.patch
                ./scripts/feeds update -a
                ./scripts/feeds install -a -f
                wget https://github.com/mj22226/openwrt-arm64/releases/download/rockchip-21.1.6/llvm-bpf-21.1.6.Linux-aarch64.tar.zst
                tar -xvf llvm-bpf-21.1.6.Linux-aarch64.tar.zst
                mv rk-snapshot .config
                echo 'CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT="/opt/hostedtoolcache/go/1.25.4/arm64/bin"' >> .config
                echo "# CONFIG_ARM64_CONTPTE is not set" >> target/linux/generic/config-6.12
                echo "# CONFIG_DRM_WERROR is not set" >> target/linux/generic/config-6.12
                make defconfig
                wget https://gist.githubusercontent.com/mj22226/9a69bb754a83e8a5cf03fcc60d62d473/raw/cc6f36831d6098de4a7fccf04a312d36a0dbc999/01-key.patch
                git apply 01-key.patch
                make download -j32
                rm 01-key.patch
                mkdir -p files/www/repo
                wget https://gist.githubusercontent.com/mj22226/2ce53b7a5e5742be6f9052a4e4d3203d/raw/674531914187c1afa92427ef51e6fa01f95aae3f/feeds-rk.patch
                git apply feeds-rk.patch
                make -j$(nproc) 'IGNORE_ERRORS=n m' || true
                tar -czvf bin/targets/rockchip/armv8/feeds-packages.tar.gz bin/packages || true
                tar -czvf bin/targets/rockchip/armv8/logs.tar.gz logs
                rm -rf bin/targets/rockchip/armv8/packages
                echo "D=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
            - name: Delete tag
              uses: ClementTsang/delete-tag-and-release@v0.4.0
              with:
                delete_release: true
                tag_name: r6-12-24
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Create release
              uses: ncipollo/release-action@main
              with:
                allowUpdates: true
                name: R6 v6.12-24 Firmware Images ${{ env.D }}
                tag: r6-12-24
                replacesArtifacts: true
                makeLatest: true
                token: "${{ secrets.GITHUB_TOKEN }}"
                artifacts: openwrt/bin/targets/rockchip/armv8/*






