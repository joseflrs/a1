name: Cudy x6 images arm64 fix
on:
   workflow_dispatch:
jobs:
    build:
        name: Cudy x6 images fix
        runs-on: ubuntu-24.04-arm
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: setup go
              uses: actions/setup-go@v6
              with:
                go-version: '1.25.4'
                cache: false
            - name: checkout
              uses: actions/checkout@v4
            - name: Build
              run: |
                go version | true
                git clone https://github.com/openwrt/openwrt.git
                cp -rf r3/* openwrt/
                cd openwrt
                git apply mac80211.patch
                git apply kernel.patch
                git apply pm.patch
                git apply mt7621.patch
                git apply 01-ip-addr.patch
                sed -i -E 's;git.openwrt.org/(feed|project);github.com/openwrt;' feeds.conf.default
                sed -i "1s/packages.git/packages.git;openwrt-24.10/" feeds.conf.default
                sed -i "2s/luci.git/luci.git;openwrt-24.10/" feeds.conf.default
                ./scripts/feeds update -a
                ./scripts/feeds install -a -f
                cd feeds/luci
                wget https://github.com/mj22226/luci/commit/8f4a290b4e8ecd64888ad1feea9c2b3c6383cc60.patch
                wget https://github.com/mj22226/luci/commit/22c05f0beb664c8d4cbc0a9b6fa17a5feb00f5bb.patch
                git apply 8f4a290b4e8ecd64888ad1feea9c2b3c6383cc60.patch
                git apply 22c05f0beb664c8d4cbc0a9b6fa17a5feb00f5bb.patch
                cd -
                cd feeds/packages
                rm -rf net/openvpn
                wget https://github.com/mj22226/packages/commit/6a1a860f7b7d61ce0292a9aef9b4cea54d65ceb6.patch
                git apply 6a1a860f7b7d61ce0292a9aef9b4cea54d65ceb6.patch
                cd -
                ./scripts/feeds update -a
                ./scripts/feeds install -a -f
                mv cudy-x6 .config
                echo 'CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT="/opt/hostedtoolcache/go/1.25.4/arm64/bin"' >> .config
                sed -i '12d' feeds/luci/applications/luci-app-attendedsysupgrade/Makefile
                sed -i "4s/login/login -f root/" feeds/packages/utils/ttyd/files/ttyd.config
                make defconfig
                make download -j32
                rm -rf files
                make -j$(nproc) 'IGNORE_ERRORS=n m'
                rm -rf bin/targets/ramips/mt7621/packages
                echo "D=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
            - name: Delete tag
              uses: ClementTsang/delete-tag-and-release@v0.4.0
              with:
                delete_release: true
                tag_name: cudyx6-arm64-fix
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Create release
              uses: ncipollo/release-action@v1.14.0
              with:
                allowUpdates: true
                name: Cudy X6 Images ARM64 Fix ${{ env.D }}
                tag: cudyx6-arm64-fix
                replacesArtifacts: true
                makeLatest: true
                token: "${{ secrets.GITHUB_TOKEN }}"
                artifacts: openwrt/bin/targets/ramips/mt7621/*
