name: Cudy x6 images arm64
on:
   workflow_dispatch:
jobs:
    build:
        name: Cudy x6 images
        runs-on: ubuntu-24.04-arm
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: setup go
              uses: actions/setup-go@v6
              with:
                go-version: '1.25.4'
                cache: false
            - name: checkout
              uses: actions/checkout@v4
            - name: Build
              run: |
                go version | true
                git clone https://github.com/openwrt/openwrt.git
                cp -rf r3/* openwrt/
                cd openwrt
                patch -p 1 -i mac80211.patch
                patch -p 1 -i kernel.patch
                git apply pm.patch
                git apply mt7621.patch
                git apply 01-ip-addr.patch
                sed -i -E 's;git.openwrt.org/(feed|project);github.com/openwrt;' feeds.conf.default
                sed -i "1s/packages.git/packages.git;openwrt-24.10/" feeds.conf.default
                sed -i "2s/luci.git/luci.git;openwrt-24.10/" feeds.conf.default
                ./scripts/feeds update -a
                ./scripts/feeds install -a -f
                cd feeds/luci
                wget https://github.com/openwrt/luci/commit/721369b8bf04f87974e9757c465f827df936ef69.patch
                wget https://github.com/openwrt/luci/commit/9c7e472edb207cb18a46fd191471dcdfc2645da0.patch
                wget https://github.com/openwrt/luci/commit/9c4b2ee8dedd4df676ee3e85dc5bda112236806a.patch
                wget https://github.com/openwrt/luci/commit/45de9becd1d23aa6772a804d99c3f9355a40a327.patch
                git apply 721369b8bf04f87974e9757c465f827df936ef69.patch
                git apply 9c7e472edb207cb18a46fd191471dcdfc2645da0.patch
                git apply 9c4b2ee8dedd4df676ee3e85dc5bda112236806a.patch
                git apply 45de9becd1d23aa6772a804d99c3f9355a40a327.patch
                cd -
                cd feeds/packages
                wget https://github.com/openwrt/packages/commit/8a87d20fd7f16f80f10a15c1f24230e9257e97c5.patch
                wget https://github.com/openwrt/packages/commit/209070b5cea8200b21f165b88a46b88f05ec803c.patch
                wget https://github.com/openwrt/packages/commit/5aff25eba62bf6df88c3cbacdddd20adc886ae3e.patch
                wget https://github.com/openwrt/packages/commit/7a64ae9da2edf2a504d751a0f07b7995492d7902.patch
                wget https://github.com/openwrt/packages/commit/7f0772c1a41a20698e23dbd53eff8643fde2d64f.patch
                git apply 8a87d20fd7f16f80f10a15c1f24230e9257e97c5.patch
                git apply 209070b5cea8200b21f165b88a46b88f05ec803c.patch
                git apply 5aff25eba62bf6df88c3cbacdddd20adc886ae3e.patch
                git apply 7a64ae9da2edf2a504d751a0f07b7995492d7902.patch
                git apply 7f0772c1a41a20698e23dbd53eff8643fde2d64f.patch
                cd -
                ./scripts/feeds update -a
                ./scripts/feeds install -a -f
                mv cudy-x6 .config
                echo 'CONFIG_GOLANG_EXTERNAL_BOOTSTRAP_ROOT="/opt/hostedtoolcache/go/1.25.4/arm64/bin"' >> .config

                sed -i "4s/login/login -f root/" feeds/packages/utils/ttyd/files/ttyd.config
                make defconfig
                make download -j32
                rm -rf files
                make -j$(nproc) 'IGNORE_ERRORS=n m'
                rm -rf bin/targets/ramips/mt7621/packages
                echo "D=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
            - name: Delete tag
              uses: ClementTsang/delete-tag-and-release@v0.4.0
              with:
                delete_release: true
                tag_name: cudyx6-arm64
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Create release
              uses: ncipollo/release-action@v1.14.0
              with:
                allowUpdates: true
                name: Cudy X6 Images ARM64 ${{ env.D }}
                tag: cudyx6-arm64
                replacesArtifacts: true
                makeLatest: true
                token: "${{ secrets.GITHUB_TOKEN }}"
                artifacts: openwrt/bin/targets/ramips/mt7621/*
